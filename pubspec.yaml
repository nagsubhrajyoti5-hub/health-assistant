name: health_assistant
description: Personal Health Assistant App

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.13.0
  firebase_auth: ^4.16.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Image picker
  image_picker: ^1.0.7

flutter:
  uses-material-design: true