name: health_assistant
description: Personal Medical Assistant - BP, Medicines, OCR, Precise AI Advisor

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  uuid: ^4.0.0
  fl_chart: ^0.70.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  image_picker: ^1.1.0
  google_mlkit_text_recognition: ^0.13.0
  google_generative_ai: ^0.4.0
  speech_to_text: ^6.6.0
  local_auth: ^2.2.0
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true